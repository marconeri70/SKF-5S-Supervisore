<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SKF 5S — Note</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/skf-192.png">
  <meta name="theme-color" content="#0d63d6">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="notes">
<header class="appbar">
  <div class="brand">
    <a href="index.html" class="btn ghost">← Home</a>
    <img src="assets/skf-logo.png" alt="SKF" class="brand-logo">
    <span class="brand-title">SKF 5S</span>
    <span class="brand-badge">Supervisor</span>
  </div>
  <nav class="actions">
    <select id="f-type" class="chip">
      <option value="all">Tutti</option>
      <option value="Rettifica">Rettifica</option>
      <option value="MONTAGGIO">Montaggio</option>
    </select>
    <input id="f-from" type="date" class="chip">
    <input id="f-to" type="date" class="chip">
    <input id="f-ch" type="search" placeholder="Cerca CH... es. 24" class="chip">
    <button id="f-apply" class="btn primary">Filtra</button>
    <button id="f-clear" class="btn outline">Pulisci</button>
  </nav>
</header>

<main class="container">
  <h3>Note importate <span id="notes-count" class="muted"></span></h3>
  <div id="notes-list" class="notes"></div>

  <p style="margin-top:1.25rem">
    <a href="index.html" class="btn ghost">← Torna alla Home</a>
  </p>
</main>

<footer class="safe-bottom">
  <div class="version">v2.4.x • PWA ready</div>
</footer>

<script src="app.js"></script>
</body>
</html>
