<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>SKF 5S — Note</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/skf-192.png">
  <meta name="theme-color" content="#0d63d6">
  <link rel="stylesheet" href="style.css?v=2.5.0">
</head>
<body data-page="notes">
<header class="appbar">
  <div class="brand">
    <img src="assets/skf-logo.png" alt="SKF" class="brand-logo">
    <span class="brand-title">SKF 5S</span>
    <span class="brand-badge">Supervisor</span>
  </div>
  <nav class="actions">
    <a href="index.html" class="btn ghost">Home</a>
    <a href="checklist.html" class="btn ghost">Checklist</a>
  </nav>
</header>

<main class="container">
  <section class="card">
    <div class="filters">
      <label>Tipo
        <select id="f-type">
          <option value="all">Tutti</option>
          <option value="Rettifica">Rettifica</option>
          <option value="MONTAGGIO">Montaggio</option>
        </select>
      </label>
      <label>Da <input id="f-from" type="date"></label>
      <label>A <input id="f-to" type="date"></label>
      <label>CH <input id="f-ch" type="text" placeholder="es. 21"></label>
      <button id="f-apply" class="btn">Applica</button>
      <button id="f-clear" class="btn outline">Pulisci</button>
      <span id="notes-counter" class="muted" style="margin-left:auto"></span>
    </div>
  </section>

  <section id="notes-list"></section>
</main>

<script src="app.js?v=2.5.0"></script>
</body>
</html>
