<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SKF 5S — Schede (Supervisor)</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/skf-192.png">
  <meta name="theme-color" content="#0d63d6">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="checklist">
<header class="appbar">
  <div class="brand">
    <a href="index.html" class="btn back" style="padding: 6px 10px;">← Home</a>
    <span class="brand-title" style="margin-left:8px;">Schede</span>
  </div>
  <button id="btn-open-menu" class="btn" style="background:#fff; color:#0d63d6; border-radius:20px; font-weight:800; padding:8px 16px; box-shadow:0 2px 5px rgba(0,0,0,0.2);">⚙️ MENU</button>
</header>

<main class="container">
  <section id="cards" class="stack"></section>
</main>

<footer class="safe-bottom">
  <div class="version">v3.1 • PWA Menu Edition</div>
</footer>

<dialog id="actionMenu" class="action-sheet">
  <div class="sheet-box">
    <div class="sheet-header">
      <h3 style="margin:0; font-size:1.3rem; color:#0f172a;">🛠️ Strumenti Schede</h3>
      <button id="btn-close-menu" class="btn icon ghost" style="background:#e2e8f0; color:#475569; border-radius:50%;">✖</button>
    </div>
    <div class="sheet-grid">
      <button id="btn-presentation" class="sheet-btn" style="color:#7c3aed; background:#f5f3ff; border-color:#ddd6fe;">📊 Scarica Presentazione (PDF)</button>
      <button id="btn-print-all" class="sheet-btn" style="color:#0a57d5; background:#eff6ff; border-color:#bfdbfe;">🖨️ Stampa Fascicolo Completo</button>
      <button id="btn-toggle-all" class="sheet-btn">↕️ Comprimi / Espandi schede</button>
      <button id="btn-notes" class="sheet-btn" onclick="location.href='notes.html'">📝 Vedi tutte le Note</button>
      <button id="btn-import" class="sheet-btn">📥 Importa Dati da Operatori</button>
      <button id="btn-lock" class="sheet-btn" style="color:#ef4444;">🔒 Blocca / Sblocca App</button>
    </div>
  </div>
</dialog>

<dialog id="pinDialog" class="modal">
  <div class="modal-box">
    <h4 style="margin-top:0; color:#0d63d6;">🔒 Area Riservata</h4>
    <p class="muted" style="font-size: 0.9rem; margin-top: 0; margin-bottom: 16px;">Inserisci il PIN Supervisore per procedere.</p>
    <div class="field">
      <span>PIN (Default: 6170)</span>
      <input type="password" id="pinInput" inputmode="numeric" placeholder="••••" />
    </div>
    <div class="modal-actions">
      <button id="btn-cancel-pin" class="btn outline">Annulla</button>
      <button id="btn-confirm-pin" class="btn primary">Sblocca</button>
    </div>
  </div>
</dialog>

<script src="app.js"></script>
</body>
</html>
