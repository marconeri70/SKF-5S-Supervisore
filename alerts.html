<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SKF 5S — Allerte</title>
  <link rel="icon" href="assets/skf-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="alerts">
<header class="appbar">
  <div class="brand">
    <img src="assets/skf-logo.png" class="brand-logo" alt="SKF">
    <span class="brand-title">SKF 5S</span>
    <span class="brand-badge" style="background: #ef4444;">Allerte</span>
  </div>
  <nav class="actions">
    <a href="index.html" class="btn outline" style="background:#fff; border:none; padding:8px 12px;">← Home</a>
  </nav>
</header>

<main class="container">
  <section class="card" style="border-left: 4px solid #ef4444; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
    <div>
      <h3 style="margin-top:0; color: #ef4444;">🚨 Pannello Allerte: Da Verificare <span id="alerts-count"></span></h3>
      <p class="muted small" style="margin-bottom:0;">
        Elenco dei canali con punteggi inferiori a 5 o ritardi di compilazione.
      </p>
    </div>
    <button id="btn-print-alerts-all" class="btn primary" style="background:#ef4444;">🖨️ Stampa Tutte le Allerte</button>
  </section>

  <section class="card">
    <div class="filters-grid">
      <div class="f-group">
        <label>Reparto</label>
        <select id="f-type">
          <option value="all">Tutti</option>
          <option value="Rettifica">Rettifica</option>
          <option value="MONTAGGIO">Montaggio</option>
        </select>
      </div>
      <div class="f-group">
        <label>Canale</label>
        <input id="f-ch" type="text" placeholder="Es. CH 11">
      </div>
      <div class="f-actions" style="align-items: flex-end;">
        <button id="f-apply" class="btn outline" style="height: 42px; border-color:#ef4444; color:#ef4444; font-weight:bold;">Applica</button>
      </div>
    </div>
  </section>

  <div id="alerts-list" class="stack"></div>
</main>

<script src="app.js"></script>
</body>
</html>
